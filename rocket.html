<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Lander Fullscreen</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #ui {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    pointer-events: none;
  }

  #controls {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    pointer-events: none;
  }

  .btn {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    background: rgba(255,255,255,0.08);
    color: white;
    pointer-events: auto;
  }

  .btn:active {
    background: rgba(255,255,255,0.2);
  }

  #left { left: 20px; bottom: 20px; }
  #right { left: 120px; bottom: 20px; }
  #thrust { right: 30px; bottom: 40px; width: 90px; height: 90px; }

  @media (min-width: 768px) {
    #controls { display: none; }
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="stats"></div>
  <div>⬆️⬅️➡️ or touch</div>
</div>

<div id="controls">
  <button class="btn" id="left">⬅️</button>
  <button class="btn" id="right">➡️</button>
  <button class="btn" id="thrust">🚀</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// FULLSCREEN
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// PLANETS
const planets = [
  { name: "Moon", gravity: 0.04, reward: 60, color: "#888" },
  { name: "Mars", gravity: 0.07, reward: 90, color: "#c1440e" },
  { name: "Earth", gravity: 0.11, reward: 140, color: "#2e8b57" }
];

let planetIndex = 0;
let player = { money: 100 };

// ROCKET
let rocket = {
  x: 200,
  y: 80,
  vx: 0,
  vy: 0,
  fuel: 120,
  maxFuel: 120,
  thrust: 0.3,
  alive: true,
  landed: false
};

// PAD
let pad = { x: 150, width: 120 };

function resetRocket() {
  rocket.x = canvas.width / 2;
  rocket.y = 100;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.fuel = rocket.maxFuel;
  rocket.alive = true;
  rocket.landed = false;

  pad.x = Math.random() * (canvas.width - pad.width);
}

// INPUT
let input = { left: false, right: false, thrust: false };

// KEYBOARD
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") input.left = true;
  if (e.key === "ArrowRight") input.right = true;
  if (e.key === "ArrowUp") input.thrust = true;
  if (e.key.toLowerCase() === "r") resetRocket();
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft") input.left = false;
  if (e.key === "ArrowRight") input.right = false;
  if (e.key === "ArrowUp") input.thrust = false;
});

// TOUCH BUTTONS
function bindButton(id, key) {
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e => {
    e.preventDefault();
    input[key] = true;
  });

  btn.addEventListener("touchend", () => input[key] = false);

  btn.addEventListener("mousedown", () => input[key] = true);
  btn.addEventListener("mouseup", () => input[key] = false);
}

bindButton("left", "left");
bindButton("right", "right");
bindButton("thrust", "thrust");

// UPDATE
function update() {
  const planet = planets[planetIndex];

  if (!rocket.alive || rocket.landed) return;

  rocket.vy += planet.gravity;
  rocket.vx *= 0.99;

  if (input.thrust && rocket.fuel > 0) {
    rocket.vy -= rocket.thrust;
    rocket.fuel -= 0.5;
  }

  if (input.left) rocket.vx -= 0.08;
  if (input.right) rocket.vx += 0.08;

  rocket.x += rocket.vx;
  rocket.y += rocket.vy;

  if (rocket.x < 0) rocket.x = 0;
  if (rocket.x > canvas.width) rocket.x = canvas.width;

  if (rocket.y > canvas.height - 40) {
    rocket.y = canvas.height - 40;

    const onPad = rocket.x > pad.x && rocket.x < pad.x + pad.width;
    const safe = Math.abs(rocket.vy) < 2 && Math.abs(rocket.vx) < 1.5;

    if (onPad && safe) {
      rocket.landed = true;
      player.money += planet.reward;
    } else {
      rocket.alive = false;
    }

    rocket.vx = 0;
    rocket.vy = 0;
  }
}

// DRAW
function draw() {
  const planet = planets[planetIndex];

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ground
  ctx.fillStyle = planet.color;
  ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

  // pad
  ctx.fillStyle = "yellow";
  ctx.fillRect(pad.x, canvas.height - 35, pad.width, 6);

  // rocket
  ctx.fillStyle = "white";
  ctx.fillRect(rocket.x - 6, rocket.y - 12, 12, 24);

  // flame
  if (input.thrust && rocket.fuel > 0) {
    ctx.fillStyle = "orange";
    ctx.fillRect(rocket.x - 4, rocket.y + 12, 8, 14);
  }

  document.getElementById("stats").innerHTML =
    `Planet: ${planet.name} | Fuel: ${Math.floor(rocket.fuel)} | Money: $${player.money}`;

  if (!rocket.alive) {
    ctx.fillStyle = "red";
    ctx.fillText("CRASH - Tap / Press R", canvas.width/2 - 90, canvas.height/2);
  }

  if (rocket.landed) {
    ctx.fillStyle = "lime";
    ctx.fillText("LANDED - Tap to continue", canvas.width/2 - 100, canvas.height/2);
  }
}

// CLICK / TAP
canvas.addEventListener("click", () => {
  if (!rocket.alive) resetRocket();
  else if (rocket.landed) {
    planetIndex = (planetIndex + 1) % planets.length;
    resetRocket();
  }
});

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resetRocket();
loop();
</script>

</body>
</html>
