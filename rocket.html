<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Lander Universal</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
  }

  #ui {
    padding: 8px;
    font-size: 14px;
  }

  canvas {
    display: block;
    margin: auto;
    background: #000;
    width: 100%;
    max-width: 600px;
  }

  #controls {
    position: fixed;
    bottom: 10px;
    width: 100%;
  }

  .btn {
    width: 70px;
    height: 70px;
    margin: 10px;
    font-size: 20px;
    border-radius: 50%;
    border: none;
    background: #222;
    color: white;
    opacity: 0.8;
  }

  .btn:active {
    background: #555;
  }

  @media (min-width: 768px) {
    #controls {
      display: none; /* hide buttons on PC */
    }
  }
</style>
</head>
<body>

<div id="ui">
  <div id="stats"></div>
  <div>PC: ⬆️⬅️➡️ | Mobile: Buttons</div>
</div>

<canvas id="game"></canvas>

<div id="controls">
  <button class="btn" id="left">⬅️</button>
  <button class="btn" id="thrust">⬆️</button>
  <button class="btn" id="right">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// RESPONSIVE
function resize() {
  canvas.width = Math.min(window.innerWidth, 600);
  canvas.height = window.innerHeight * 0.7;
}
resize();
window.addEventListener("resize", resize);

// PLANETS
const planets = [
  { name: "Moon", gravity: 0.04, reward: 60, color: "#888" },
  { name: "Mars", gravity: 0.07, reward: 90, color: "#c1440e" },
  { name: "Earth", gravity: 0.11, reward: 140, color: "#2e8b57" }
];

let planetIndex = 0;
let player = { money: 100 };

// ROCKET
let rocket = {
  x: 200,
  y: 80,
  vx: 0,
  vy: 0,
  fuel: 120,
  maxFuel: 120,
  thrust: 0.3,
  alive: true,
  landed: false
};

// PAD
let pad = { x: 150, width: 100 };

function resetRocket() {
  rocket.x = canvas.width / 2;
  rocket.y = 80;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.fuel = rocket.maxFuel;
  rocket.alive = true;
  rocket.landed = false;

  pad.x = Math.random() * (canvas.width - pad.width);
}

// INPUT (KEYBOARD + TOUCH)
let input = { left: false, right: false, thrust: false };

// keyboard
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") input.left = true;
  if (e.key === "ArrowRight") input.right = true;
  if (e.key === "ArrowUp") input.thrust = true;
  if (e.key.toLowerCase() === "r") resetRocket();
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft") input.left = false;
  if (e.key === "ArrowRight") input.right = false;
  if (e.key === "ArrowUp") input.thrust = false;
});

// touch buttons
function bindButton(id, key) {
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e => {
    e.preventDefault();
    input[key] = true;
  });

  btn.addEventListener("touchend", () => input[key] = false);

  btn.addEventListener("mousedown", () => input[key] = true);
  btn.addEventListener("mouseup", () => input[key] = false);
}

bindButton("left", "left");
bindButton("right", "right");
bindButton("thrust", "thrust");

// UPDATE
function update() {
  const planet = planets[planetIndex];

  if (!rocket.alive || rocket.landed) return;

  rocket.vy += planet.gravity;
  rocket.vx *= 0.99;

  if (input.thrust && rocket.fuel > 0) {
    rocket.vy -= rocket.thrust;
    rocket.fuel -= 0.5;
  }

  if (input.left) rocket.vx -= 0.08;
  if (input.right) rocket.vx += 0.08;

  rocket.x += rocket.vx;
  rocket.y += rocket.vy;

  if (rocket.x < 0) rocket.x = 0;
  if (rocket.x > canvas.width) rocket.x = canvas.width;

  if (rocket.y > canvas.height - 30) {
    rocket.y = canvas.height - 30;

    const onPad = rocket.x > pad.x && rocket.x < pad.x + pad.width;
    const safe = Math.abs(rocket.vy) < 2 && Math.abs(rocket.vx) < 1.5;

    if (onPad && safe) {
      rocket.landed = true;
      player.money += planet.reward;
    } else {
      rocket.alive = false;
    }

    rocket.vx = 0;
    rocket.vy = 0;
  }
}

// DRAW
function draw() {
  const planet = planets[planetIndex];

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = planet.color;
  ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

  ctx.fillStyle = "yellow";
  ctx.fillRect(pad.x, canvas.height - 25, pad.width, 5);

  ctx.fillStyle = "white";
  ctx.fillRect(rocket.x - 5, rocket.y - 10, 10, 20);

  if (input.thrust && rocket.fuel > 0) {
    ctx.fillStyle = "orange";
    ctx.fillRect(rocket.x - 3, rocket.y + 10, 6, 12);
  }

  document.getElementById("stats").innerHTML =
    `Planet: ${planet.name} | Fuel: ${Math.floor(rocket.fuel)} | Money: $${player.money}`;

  if (!rocket.alive) {
    ctx.fillStyle = "red";
    ctx.fillText("CRASH! Press R / Tap", canvas.width/2 - 80, canvas.height/2);
  }

  if (rocket.landed) {
    ctx.fillStyle = "lime";
    ctx.fillText("LANDED! Tap / Click", canvas.width/2 - 70, canvas.height/2);
  }
}

// CLICK / TAP
canvas.addEventListener("click", () => {
  if (!rocket.alive) resetRocket();
  else if (rocket.landed) {
    planetIndex = (planetIndex + 1) % planets.length;
    resetRocket();
  }
});

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resetRocket();
loop();
</script>

</body>
</html>
