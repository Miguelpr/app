<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }
        #status {
            margin-top: 20px;
            color: #333;
        }
        #downloadLink {
            display: none;
            margin-top: 20px;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>TikTok Video Downloader</h1>
    <p>Enter a TikTok video URL to download it without a watermark.</p>
    <input type="text" id="tiktokUrl" placeholder="https://www.tiktok.com/@username/video/1234567890123456789" style="width: 80%;">
    <br>
    <button onclick="downloadVideo()">Download Video</button>
    <div id="status">Enter a URL and click Download.</div>
    <a id="downloadLink" href="#" download>Click here to download the video</a>

    <script>
        async function downloadVideo() {
            const tiktokUrl = document.getElementById('tiktokUrl').value.trim();
            const status = document.getElementById('status');
            const downloadLink = document.getElementById('downloadLink');

            if (!tiktokUrl || !tiktokUrl.includes('tiktok.com')) {
                status.textContent = 'Please enter a valid TikTok URL.';
                return;
            }

            status.textContent = 'Processing...';
            downloadLink.style.display = 'none';

            // Try SnapTik first
            let videoUrl = await trySnapTik(tiktokUrl);
            if (!videoUrl) {
                status.textContent = 'SnapTik failed, trying ssstik.io...';
                videoUrl = await trySssTik(tiktokUrl);
            }

            if (videoUrl) {
                status.textContent = 'Video ready! Click the link to download.';
                downloadLink.href = videoUrl;
                downloadLink.style.display = 'block';
            } else {
                status.textContent = 'Error: Unable to retrieve video from both services. Try another URL or check console for details.';
            }
        }

        async function trySnapTik(tiktokUrl) {
            try {
                // Use a proxy to bypass CORS (e.g., CORS Anywhere)
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = `${proxyUrl}${encodeURIComponent('https://snaptik.app/abc?url=')}${encodeURIComponent(tiktokUrl)}`;
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });

                if (!response.ok) {
                    console.error('SnapTik response error:', response.status, response.statusText);
                    return null;
                }

                const html = await response.text();
                const match = html.match(/href="(https?:\/\/[^"]+\.mp4[^"]*)"/) || 
                              html.match(/data-video="([^"]+\.mp4[^"]*)"/);
                if (!match) {
                    console.error('SnapTik: No video URL found in response.');
                    return null;
                }
                return match[1];
            } catch (error) {
                console.error('SnapTik error:', error.message);
                return null;
            }
        }

        async function trySssTik(tiktokUrl) {
            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = `${proxyUrl}${encodeURIComponent('https://ssstik.io/abc?url=')}${encodeURIComponent(tiktokUrl)}`;
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                    }
                });

                if (!response.ok) {
                    console.error('ssstik.io response error:', response.status, response.statusText);
                    return null;
                }

                const html = await response.text();
                const match = html.match(/href="(https?:\/\/[^"]+\.mp4[^"]*)"/) || 
                              html.match(/data-video="([^"]+\.mp4[^"]*)"/);
                if (!match) {
                    console.error('ssstik.io: No video URL found in response.');
                    return null;
                }
                return match[1];
            } catch (error) {
                console.error('ssstik.io error:', error.message);
                return null;
            }
        }
    </script>
